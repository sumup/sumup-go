name: Question
description: Ask a question about the SumUp Go SDK.
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Use this template for usage questions or clarification requests.
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Describe what you are trying to do and what is unclear.
      placeholder: Ask your question here.
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Relevant code or context
      description: Share any code, configuration, or API usage that would help explain the question.
      render: go
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: e.g. v0.9.0
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: e.g. 1.24.3
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any extra details that would help us answer.
